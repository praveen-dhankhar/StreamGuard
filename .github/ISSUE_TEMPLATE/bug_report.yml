name: Bug report
description: Report a reproducible problem in StreamGuard
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or git SHA
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      placeholder: Describe the observed behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before submitting
